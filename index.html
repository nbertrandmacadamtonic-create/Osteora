<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OstéoPratik</title>

  <style>
    :root{
      --bg:#020817;
      --bg2:#07162f;
      --panel:rgba(10,24,52,.72);
      --panel-soft:rgba(10,24,52,.52);
      --line:rgba(139,180,255,.18);
      --text:#f5fbff;
      --muted:#b7c7e9;
      --muted2:#8aa0c8;
      --cyan:#46ddff;
      --blue:#4cb7ff;
      --purple:#9b5cff;
      --green:#7bffc7;
      --gold:#ffbf47;
      --navH:88px;
      --radius:24px;
      --shadow:0 12px 30px rgba(0,0,0,.35);
      --glow-cyan:0 0 18px rgba(70,221,255,.18);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#010611;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 14% 78%, rgba(106,68,255,.18), transparent 18%),
        radial-gradient(circle at 80% 16%, rgba(0,160,255,.10), transparent 22%),
        linear-gradient(180deg, #010611 0%, #031022 100%);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:0;
    }

    button{
      font-family:inherit;
      border:0;
      background:none;
      color:inherit;
      -webkit-tap-highlight-color:transparent;
    }

    .screen{
      width:100%;
      max-width:430px;
      min-height:100vh;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(7,22,47,.92), rgba(3,14,31,.98)),
        #020816;
      box-shadow:0 0 0 1px rgba(255,255,255,.03);
    }

    .screen::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,194,255,.08), transparent 30%),
        linear-gradient(90deg, transparent 0%, rgba(31,88,162,.18) 48%, rgba(31,88,162,.18) 52%, transparent 100%);
      pointer-events:none;
    }

    .content{
      position:relative;
      z-index:2;
      padding:18px 16px calc(var(--navH) + 22px);
    }

    .top-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-top:8px;
      margin-bottom:8px;
    }

    .icon-btn{
      width:48px;
      height:48px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      color:#dfeaff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      cursor:pointer;
      flex:0 0 auto;
    }

    .icon-btn svg{width:22px;height:22px;opacity:.92}

    .brand-wrap{
      text-align:center;
      margin:8px 0 14px;
    }

    .brand-title{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:112px;
      margin-top:-4px;
    }

    .brand-title img{
      display:block;
      width:min(340px, 88vw);
      max-width:100%;
      height:auto;
      object-fit:contain;
      filter:drop-shadow(0 0 18px rgba(65,220,255,.16));
    }

    .brand-title-fallback{
      display:none;
      font-weight:800;
      font-size:42px;
      line-height:.95;
      letter-spacing:.01em;
      text-align:center;
    }

    .brand-title-fallback .o{color:#ffffff}
    .brand-title-fallback .p{color:#46ddff}

    .brand-question{
      margin-top:0;
      color:#dce8ff;
      font-size:16px;
      font-weight:600;
      opacity:.96;
    }

    .premium-line{
      margin:14px 0 18px;
      min-height:64px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(18,34,68,.72), rgba(11,26,56,.58));
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px 16px;
      text-align:center;
      overflow:hidden;
      position:relative;
    }

    .premium-line::before{
      content:"";
      position:absolute;
      left:18px;
      right:18px;
      top:0;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(70,221,255,.25), transparent);
    }

    .premium-line-text{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:nowrap;
      white-space:nowrap;
      font-size:14px;
      font-weight:800;
      color:#eef7ff;
      letter-spacing:.01em;
    }

    .premium-line-text .dot{
      color:rgba(70,221,255,.8);
      font-weight:800;
      transform:translateY(-1px);
    }

    .orbits{
      position:relative;
      width:100%;
      height:440px;
      margin-top:8px;
      margin-bottom:18px;
    }

    .hero-figure{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:236px;
      max-width:64%;
      height:auto;
      object-fit:contain;
      opacity:.92;
      filter:drop-shadow(0 0 22px rgba(67,214,255,.16));
      pointer-events:none;
      z-index:1;
    }

    .hero-figure.fallback-hidden{display:none}

    .hub{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:96px;
      height:96px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.10), rgba(9,18,33,.76) 60%);
      border:4px solid rgba(141,232,255,.86);
      box-shadow:0 0 0 2px rgba(105,228,255,.18), 0 0 26px rgba(85,226,255,.24);
      z-index:5;
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(5px);
      -webkit-backdrop-filter:blur(5px);
    }

    .hub::before{
      content:"";
      width:28px;
      height:28px;
      border-radius:8px;
      background:linear-gradient(135deg, rgba(70,221,255,.20), rgba(70,221,255,.03));
      border:2px solid rgba(104,232,255,.95);
      transform:rotate(45deg);
      box-shadow:0 0 18px rgba(70,221,255,.25);
    }

    .quadrant{
      position:absolute;
      width:calc(50% - 8px);
      height:calc(50% - 8px);
      border:3px solid;
      background:linear-gradient(180deg, rgba(7,13,27,.38), rgba(5,9,20,.10));
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
      box-shadow:inset 0 0 20px rgba(255,255,255,.02), 0 0 24px rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:22px 16px;
      cursor:pointer;
      transition:.2s ease;
      z-index:3;
      overflow:hidden;
    }

    .quadrant:active{transform:scale(.985)}

    .quadrant .q-inner{
      position:relative;
      z-index:2;
    }

    .quadrant .q-icon{
      width:72px;
      height:72px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 16px;
      border:3px solid currentColor;
      color:inherit;
      box-shadow:0 0 18px currentColor;
      font-size:32px;
      font-weight:800;
      line-height:1;
    }

    .quadrant h3{
      margin:0;
      font-size:22px;
      line-height:1.02;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .quadrant p{
      margin:7px 0 0;
      font-size:14px;
      line-height:1.15;
      font-weight:700;
      color:#ebf4ff;
      opacity:.94;
    }

    .q-videos{
      left:0; top:0;
      border-color:var(--purple);
      color:var(--purple);
      border-radius:40px 24px 24px 24px;
    }

    .q-revise{
      right:0; top:0;
      border-color:var(--green);
      color:var(--green);
      border-radius:24px 40px 24px 24px;
    }

    .q-test{
      left:0; bottom:0;
      border-color:var(--gold);
      color:var(--gold);
      border-radius:24px 24px 24px 40px;
    }

    .q-suivre{
      right:0; bottom:0;
      border-color:var(--cyan);
      color:var(--cyan);
      border-radius:24px 24px 40px 24px;
    }

    .q-videos h3,.q-revise h3,.q-test h3,.q-suivre h3{color:#fff}
    .q-videos p,.q-revise p,.q-test p,.q-suivre p{color:#eff7ff}

    .last-card{
      margin-top:6px;
      position:relative;
      overflow:hidden;
      border-radius:24px;
      padding:18px 18px 16px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(11,25,55,.86), rgba(7,18,40,.88));
      box-shadow:var(--shadow);
      cursor:pointer;
    }

    .last-card::before{
      content:"";
      position:absolute;
      inset:auto 24px 0 24px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(70,221,255,.18), transparent);
    }

    .last-card-head{
      color:#8da3c8;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:12px;
      font-weight:800;
      margin-bottom:10px;
    }

    .last-main{
      display:flex;
      align-items:flex-start;
      gap:14px;
    }

    .last-icon{
      width:54px;
      height:54px;
      border-radius:50%;
      border:2px solid rgba(89,230,255,.72);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--cyan);
      box-shadow:0 0 18px rgba(89,230,255,.16);
      flex:0 0 auto;
      font-size:22px;
      font-weight:900;
    }

    .last-copy{
      flex:1 1 auto;
      min-width:0;
    }

    .last-title{
      font-size:18px;
      line-height:1.08;
      font-weight:800;
      color:#ffffff;
      margin:0 0 10px;
      letter-spacing:-.02em;
    }

    .last-meta{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-height:28px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(34,80,160,.36);
      border:1px solid rgba(119,165,255,.18);
      color:#dce9ff;
      font-size:12px;
      font-weight:700;
    }

    .last-status{
      color:#8aa0c8;
      font-size:12px;
      font-weight:700;
    }

    .last-value{
      flex:0 0 auto;
      font-size:22px;
      font-weight:900;
      color:var(--cyan);
      min-width:52px;
      text-align:right;
      line-height:1;
      padding-top:4px;
    }

    .progress{
      width:100%;
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      margin-top:4px;
    }

    .progress > span{
      display:block;
      height:100%;
      width:0%;
      background:linear-gradient(90deg, var(--cyan), #7cf0ff);
      box-shadow:0 0 14px rgba(70,221,255,.26);
      border-radius:999px;
      transition:width .25s ease;
    }

    .bottom-nav{
      position:sticky;
      bottom:10px;
      z-index:30;
      margin:26px auto 0;
      width:100%;
      max-width:100%;
      min-height:var(--navH);
      border-radius:30px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(4,13,29,.84);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:space-around;
      padding:10px 8px calc(10px + env(safe-area-inset-bottom, 0px));
    }

    .nav-item{
      text-decoration:none;
      color:#d7e6ff;
      width:20%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-size:11px;
      font-weight:700;
      opacity:.88;
    }

    .nav-item svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-item.active{
      color:var(--cyan);
      opacity:1;
    }

    @media (max-width:390px){
      .content{padding-left:14px;padding-right:14px}
      .brand-title{min-height:104px}
      .brand-title img{width:min(318px,88vw)}
      .premium-line-text{font-size:12.4px;gap:7px}
      .quadrant h3{font-size:20px}
      .quadrant p{font-size:13px}
      .orbits{height:408px}
      .hub{width:88px;height:88px}
    }
  </style>
</head>

<body>
  <div class="screen">
    <div class="content">

      <div class="top-row">
        <button class="icon-btn" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="icon-btn" aria-label="Options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M8 7h8M6 12h12M8 17h8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="brand-wrap">
        <div class="brand-title">
          <img
            id="appTitleImage"
            src="assets/images/logo-osteo-pratik-title-transparent-corrected.webp"
            alt="Ostéo Pratik"
            onerror="this.style.display='none';document.getElementById('brandFallback').style.display='block';"
          />
          <div id="brandFallback" class="brand-title-fallback">
            <span class="o">Ostéo</span><br><span class="p">Pratik</span>
          </div>
        </div>
        <div class="brand-question">Que voulez-vous faire ?</div>
      </div>

      <div class="premium-line">
        <div class="premium-line-text">
          <span>Apprendre</span>
          <span class="dot">•</span>
          <span>Comprendre</span>
          <span class="dot">•</span>
          <span>Corriger</span>
          <span class="dot">•</span>
          <span>Réviser</span>
        </div>
      </div>

      <section class="orbits">
        <img
          class="hero-figure"
          id="heroFigure"
          src="assets/images/home-body.webp"
          alt="Personnage central"
          onerror="this.classList.add('fallback-hidden');"
        />

        <button class="quadrant q-videos js-track"
                data-title="Catalogue vidéos"
                data-section="Vidéos"
                data-tag="Catalogue"
                data-value="01"
                data-progress="18"
                data-route="#videos">
          <div class="q-inner">
            <div class="q-icon">▶</div>
            <h3>Vidéos</h3>
            <p>des techniques</p>
          </div>
        </button>

        <button class="quadrant q-revise js-track"
                data-title="Réviser"
                data-section="Révision"
                data-tag="Réviser"
                data-value="02"
                data-progress="40"
                data-route="#reviser">
          <div class="q-inner">
            <div class="q-icon">▤</div>
            <h3>Réviser</h3>
            <p>cartes & mémorisation</p>
          </div>
        </button>

        <button class="quadrant q-test js-track"
                data-title="Tester ses connaissances"
                data-section="Quiz"
                data-tag="Tester"
                data-value="03"
                data-progress="55"
                data-route="#tester">
          <div class="q-inner">
            <div class="q-icon">◉</div>
            <h3>Tester</h3>
            <p>mes connaissances</p>
          </div>
        </button>

        <button class="quadrant q-suivre js-track"
                data-title="Suivre ma progression"
                data-section="Statistiques"
                data-tag="Suivre"
                data-value="04"
                data-progress="72"
                data-route="#suivre">
          <div class="q-inner">
            <div class="q-icon">↗</div>
            <h3>Suivre</h3>
            <p>ma progression</p>
          </div>
        </button>

        <div class="hub" aria-hidden="true"></div>
      </section>

      <section class="last-card" id="lastPracticeCard" role="button" tabindex="0">
        <div class="last-card-head">Votre dernière pratique</div>

        <div class="last-main">
          <div class="last-icon" id="lastIcon">↺</div>

          <div class="last-copy">
            <h3 class="last-title" id="lastTitle">En attente</h3>

            <div class="last-meta">
              <span class="chip" id="lastTag">Aucune activité</span>
              <span class="last-status" id="lastStatus">Aucune action enregistrée</span>
            </div>

            <div class="progress">
              <span id="lastProgressBar"></span>
            </div>
          </div>

          <div class="last-value" id="lastValue">--</div>
        </div>
      </section>

      <nav class="bottom-nav">
        <a class="nav-item active" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 11.5L12 4l8 7.5V20H4v-8.5z" stroke-linejoin="round"/>
          </svg>
          <span>Accueil</span>
        </a>

        <a class="nav-item" href="#catalogue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="4" y="5" width="16" height="14" rx="2"/>
            <path d="M8 9h8M8 13h8M8 17h5" stroke-linecap="round"/>
          </svg>
          <span>Catalogue</span>
        </a>

        <a class="nav-item" href="#parcours">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M5 8h14M5 16h14" stroke-linecap="round"/>
            <circle cx="8" cy="8" r="2"/>
            <circle cx="16" cy="16" r="2"/>
          </svg>
          <span>Parcours</span>
        </a>

        <a class="nav-item" href="#favoris">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 20s-6.5-4.3-8.5-8A5 5 0 0 1 12 6a5 5 0 0 1 8.5 6c-2 3.7-8.5 8-8.5 8z" stroke-linejoin="round"/>
          </svg>
          <span>Favoris</span>
        </a>

        <a class="nav-item" href="#profil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 19c1.6-3 4-4.5 7-4.5s5.4 1.5 7 4.5" stroke-linecap="round"/>
          </svg>
          <span>Profil</span>
        </a>
      </nav>
    </div>
  </div>

  <script>
    const LAST_PRACTICE_KEY = "osteoPratikLastPractice";

    function nowLabel() {
      const d = new Date();
      return d.toLocaleString("fr-FR", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function getDefaultPractice() {
      return {
        title: "En attente",
        section: "Aucune activité",
        tag: "Aucune activité",
        value: "--",
        progress: 0,
        route: "",
        updatedAt: "",
        icon: "↺"
      };
    }

    function getLastPractice() {
      try {
        const raw = localStorage.getItem(LAST_PRACTICE_KEY);
        if (!raw) return getDefaultPractice();
        const parsed = JSON.parse(raw);
        return { ...getDefaultPractice(), ...parsed };
      } catch (e) {
        return getDefaultPractice();
      }
    }

    function saveLastPractice(payload) {
      const clean = {
        ...getDefaultPractice(),
        ...payload,
        updatedAt: payload.updatedAt || nowLabel()
      };
      localStorage.setItem(LAST_PRACTICE_KEY, JSON.stringify(clean));
      renderLastPractice();
    }

    function clearLastPractice() {
      localStorage.removeItem(LAST_PRACTICE_KEY);
      renderLastPractice();
    }

    function renderLastPractice() {
      const data = getLastPractice();

      const title = document.getElementById("lastTitle");
      const tag = document.getElementById("lastTag");
      const status = document.getElementById("lastStatus");
      const value = document.getElementById("lastValue");
      const bar = document.getElementById("lastProgressBar");
      const icon = document.getElementById("lastIcon");
      const card = document.getElementById("lastPracticeCard");

      title.textContent = data.title || "En attente";
      tag.textContent = data.tag || "Aucune activité";
      status.textContent = data.updatedAt
        ? `${data.section || ""} • ${data.updatedAt}`
        : "Aucune action enregistrée";

      value.textContent = data.value ?? "--";
      bar.style.width = `${Math.max(0, Math.min(100, Number(data.progress) || 0))}%`;
      icon.textContent = data.icon || "↺";

      if (data.route) {
        card.dataset.route = data.route;
        card.style.cursor = "pointer";
      } else {
        card.dataset.route = "";
        card.style.cursor = "default";
      }
    }

    document.querySelectorAll(".js-track").forEach(btn => {
      btn.addEventListener("click", () => {
        const title = btn.dataset.title || "Activité";
        const section = btn.dataset.section || "Parcours";
        const tag = btn.dataset.tag || "Zone";
        const value = btn.dataset.value || "--";
        const progress = btn.dataset.progress || 0;
        const route = btn.dataset.route || "";

        saveLastPractice({
          title,
          section,
          tag,
          value,
          progress,
          route,
          icon:
            tag === "Catalogue" ? "▶" :
            tag === "Réviser" ? "▤" :
            tag === "Tester" ? "◉" :
            tag === "Suivre" ? "↗" : "↺"
        });

        if (route && route !== "#") {
          window.location.hash = route;
        }
      });
    });

    const lastCard = document.getElementById("lastPracticeCard");

    lastCard.addEventListener("click", () => {
      const data = getLastPractice();
      if (data.route) window.location.hash = data.route;
    });

    lastCard.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        lastCard.click();
      }
    });

    window.OsteoPratik = {
      setLastPractice: saveLastPractice,
      getLastPractice,
      clearLastPractice
    };

    renderLastPractice();
  </script>
