<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#a855ff" flood-opacity=".9"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855ff" stop-opacity=".22"/>
      <stop offset=".55" stop-color="#061426" stop-opacity=".72"/>
      <stop offset="1" stop-color="#a855ff" stop-opacity=".10"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#a855ff" stroke-width=".8" opacity=".13"/>
    </pattern>
  </defs>
  <path d="M482 482 H62 Q30 482 30 450 V450 A420 420 0 0 1 450 30 H450 Q482 30 482 62 Z" fill="url(#fill)" stroke="#a855ff" stroke-width="5" filter="url(#glow)"/>
  <path d="M482 482 H62 Q30 482 30 450 V450 A420 420 0 0 1 450 30 H450 Q482 30 482 62 Z" fill="url(#grid)" opacity=".45"/>
</svg>
